version: "3.8"
services:
  # PostgreSQL 数据库服务（持久化记忆）
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multiagent_postgres
    environment:
      POSTGRES_DB: multiagent_ppt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: multiagent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  ppt_agent:
    container_name: ppt_agent
    build:
      context: ./slide_agent
      dockerfile: Dockerfile
    ports:
      - "10011:10011"
      - "10012:10012"
    env_file: ./slide_agent/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  ppt_outline:
    container_name: ppt_outline
    build:
      context: ./slide_outline
      dockerfile: Dockerfile
    ports:
      - "10001:10001"
    env_file: ./slide_outline/.env
    depends_on:
      - rag_tool
      - postgres
      - redis
    restart: always

  rag_tool:
    container_name: mcp_rag_tool
    build:
      context: ./slide_outline
      dockerfile: Dockerfile_MCPRAG
    command: fastmcp run --transport sse --port 6501 --host 0.0.0.0 mcpserver/rag_tool.py
    ports:
      - "6501:6501"
    restart: always

  ppt_download:
    container_name: ppt_download
    build: ./save_ppt
    ports:
      - "10021:10021"
    restart: always

  llm_cache:
    container_name: llm_cache
    build: ../tools
    ports:
      - "6688:6688"
    restart: always

# 持久化卷
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
