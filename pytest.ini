[pytest]
# pytest 配置文件
testpaths =
    infrastructure/tests
    agents/tools/tests
    api/tests
    services/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步测试配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 输出配置
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=services
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=0

# 标记定义
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests (>1 second)
    very_slow: Very slow tests (>10 seconds)
    api: API layer tests
    service: Service layer tests
    auth: Authentication tests
    ppt: PPT generation tests
    database: Tests requiring database
    redis: Tests requiring Redis
    llm: Tests requiring LLM API
    async: Async tests
    performance: Performance and load tests
    security: Security and edge case tests
    requires_db: Tests requiring real database
    requires_redis: Tests requiring real Redis
    concurrency: Concurrency and race condition tests
    benchmark: Benchmark tests
